services:
  app:
    build: .
    ports:
      - "${APP_PORT:-8081}:80"
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: "http://localhost:${APP_PORT:-8081}"
      DB_CONNECTION: mysql
      DB_HOST: database
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-insurance}
      DB_USERNAME: ${DB_USERNAME:-insurance}
      DB_PASSWORD: ${DB_PASSWORD:-insurance}
    depends_on:
      database:
        condition: service_healthy

  database:
    image: mysql:8.4
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-insurance}
      MYSQL_USER: ${DB_USERNAME:-insurance}
      MYSQL_PASSWORD: ${DB_PASSWORD:-insurance}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql_data:
