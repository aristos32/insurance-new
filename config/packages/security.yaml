security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_users:
            entity:
                class: App\Entity\Crm\User
                property: username

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            provider: app_users
            form_login:
                login_path: app_login
                check_path: app_login
                success_handler: App\Security\LoginSuccessHandler
                enable_csrf: true
            logout:
                path: app_logout
                target: app_login

    role_hierarchy:
        ROLE_SUPER: ROLE_ADMIN
        ROLE_ADMIN: ROLE_AGENT
        ROLE_AGENT: ROLE_EMPLOYEE
        ROLE_EMPLOYEE: ROLE_CUSTOMER

    access_control:
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/users, roles: ROLE_ADMIN }
        - { path: ^/customers, roles: ROLE_EMPLOYEE }
        - { path: ^/my, roles: ROLE_CUSTOMER }
        - { path: ^/, roles: ROLE_EMPLOYEE }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
